recipe: default.v1
language: id

# TAv4 — Most Optimal: IndoBERT + RegexEntityExtractor
# Fokus: kontekstual semantik (IndoBERT) + rule-based fallback (Regex)
# Install: pip install rasa[transformers]
# Strategi: IndoBERT tangkap semantik kompleks, Regex tangkap pola negasi eksplisit
# Perubahan dari versi lama:
#   - Full HuggingFace pipeline (IndoBERT)
#   - Tambah RegexEntityExtractor sebagai fallback layer
#   - Tambah FallbackClassifier untuk intent ambiguity
#   - epochs 75 (sweet spot antara TAv1 dan TAv2)

pipeline:
  - name: WhitespaceTokenizer
    intent_tokenization_flag: false
    intent_split_symbol: "_"
  - name: LanguageModelFeaturizer
    model_name: "bert"
    model_weights: "indobenchmark/indobert-base-p1"
  - name: RegexFeaturizer
  - name: DIETClassifier
    epochs: 75
    learning_rate: 0.001
    batch_size: [64, 256]
    constrain_similarities: true
    entity_recognition: true
  - name: EntitySynonymMapper
  - name: RegexEntityExtractor
    use_lookup_tables: true
    use_regexes: true
    use_word_boundaries: true
  - name: FallbackClassifier
    threshold: 0.6
    ambiguity_threshold: 0.1
  - name: ResponseSelector
    epochs: 75
    constrain_similarities: true

policies:
  - name: MemoizationPolicy
  - name: RulePolicy
