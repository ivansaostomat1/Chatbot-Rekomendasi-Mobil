recipe: default.v1
language: id

pipeline:
  - name: WhitespaceTokenizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer

  # Sparse features (sama seperti v3, kunci menangkap kata kunci)
  - name: CountVectorsFeaturizer
    analyzer: word
    min_ngram: 1
    max_ngram: 2
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4

  # Dense features (tetap IndoBERT‑base, bukan large)
  - name: LanguageModelFeaturizer
    model_name: "bert"
    model_weights: "indobenchmark/indobert-base-p1"
    use_masked_language_model: false

  - name: DIETClassifier
    epochs: 200                        # sedikit lebih lama karena arsitektur lebih dalam
    constrain_similarities: true
    model_confidence: softmax
    number_of_transformer_layers: 2    # tambah layer (v3=0, v4 awal=4 tapi overfit)
    transformer_size: 256              # lebih besar dari v3 (biasanya 128) tapi tidak berlebihan
    dropout: 0.4                       # regularisasi lebih kuat
    weight_sparsity: 0.6               # mengurangi kompleksitas model
    batch_strategy: sequence
    batch_size: [16, 64]

  - name: EntitySynonymMapper

  - name: ResponseSelector
    epochs: 100
    constrain_similarities: true

  - name: FallbackClassifier
    threshold: 0.6                     # naik dari 0.3, cukup ketat untuk tolak OOS
    ambiguity_threshold: 0.1

policies:
  - name: MemoizationPolicy
  - name: RulePolicy
    core_fallback_threshold: 0.4
    core_fallback_action_name: "action_default_fallback"
    enable_fallback_prediction: true

  - name: UnexpecTEDIntentPolicy
    max_history: 5
    epochs: 100

  - name: TEDPolicy
    max_history: 5                      # tidak perlu terlalu panjang, fokus ke NLU
    epochs: 100
    constrain_similarities: true