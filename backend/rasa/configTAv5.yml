recipe: default.v1
language: id

pipeline:
  - name: WhitespaceTokenizer
    intent_tokenization_flag: false
    intent_split_symbol: "_"

  # Pre-trained IndoBERT (kontekstual semantik + negasi)
  - name: LanguageModelFeaturizer
    model_name: "bert"
    model_weights: "indobenchmark/indobert-base-p1"

  # Fitur regex tetap dipasang agar token digit/rupiah terdeteksi
  - name: RegexFeaturizer

  # DIET dengan curriculum batching & dropout ringan untuk generalisasi
  - name: DIETClassifier
    epochs: 75
    learning_rate: 0.001
    batch_size: [64, 256]
    dropout_rate: 0.2
    constrain_similarities: true
    entity_recognition: true

  - name: EntitySynonymMapper

  # Rule-based entity fallback: lookup + regex manual
  - name: RegexEntityExtractor
    use_lookup_tables: true
    use_regexes: true
    use_word_boundaries: true

  # Fallback hanya untuk intent yang benar-benar ambigu
  - name: FallbackClassifier
    threshold: 0.4
    ambiguity_threshold: 0.1

  # ResponseSelector tetap dipertahankan (jika ada response)
  - name: ResponseSelector
    epochs: 75
    constrain_similarities: true

policies:
  - name: MemoizationPolicy
  - name: RulePolicy