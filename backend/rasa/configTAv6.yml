recipe: default.v1
language: id

pipeline:
  - name: WhitespaceTokenizer
    intent_tokenization_flag: false
    intent_split_symbol: "_"

  # 1. IndoBERT untuk Intent Contextual Understanding (Dari TAv5)
  - name: LanguageModelFeaturizer
    model_name: "bert"
    model_weights: "indobenchmark/indobert-base-p1"

  - name: RegexFeaturizer
  
  # 2. WAJIB ADA: LexicalSyntacticFeaturizer (Untuk mendeteksi posisi "tanpa"/"bukan")
  - name: LexicalSyntacticFeaturizer
  
  # 3. WAJIB ADA: CountVectors (Sparse feature) untuk ketajaman entity boundaries
  - name: CountVectorsFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 3   # Gunakan 3 seperti di TAv1 untuk mengurangi noise

  # 4. DIETClassifier
  - name: DIETClassifier
    epochs: 150    # DITINGKATKAN DARI 75/100 -> 150 (Meniru kesuksesan TAv1 dalam mengekstrak feature.negated)
    learning_rate: 0.001
    batch_size: [64, 256]
    # dropout_rate dihapus agar sama persis dengan default TAv1 yang stabil
    constrain_similarities: true
    entity_recognition: true

  - name: EntitySynonymMapper
  
  # RegexEntityExtractor tetap dihapus agar tidak bentrok dengan DIET
  
  - name: FallbackClassifier
    threshold: 0.4
    ambiguity_threshold: 0.1
  - name: ResponseSelector
    epochs: 150
    constrain_similarities: true

policies:
  - name: MemoizationPolicy
  - name: RulePolicy
