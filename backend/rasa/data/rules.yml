version: "3.1"

rules:

- rule: handle recommendation request
  steps:
  - intent: ask_recommendation
  - action: action_recommend_car

- rule: handle start search
  steps:
  - intent: start_search
  - action: action_recommend_car

- rule: handle out of scope
  steps:
  - intent: out_of_scope
  - action: utter_default

- rule: user choose preference
  steps:
  - intent: choose_preference
  - action: action_recommend_car

# ─────────────────────────────────────────────────────────────────────────────
# Rule: handle budget comparison
# Catatan: rule ini aktif, NAMUN ask_comparison belum punya training data NLU.
# Intent ini tidak akan terdeteksi sampai data training ditambahkan (TA scope).
# ─────────────────────────────────────────────────────────────────────────────
- rule: handle budget comparison
  steps:
  - intent: ask_comparison
  - action: action_compare_budget

- rule: Ask the user to rephrase whenever they send a message with low NLU confidence
  steps:
  - intent: nlu_fallback
  - action: utter_default