version: "3.1"

stories:


- story: direct recommendation
  steps:
  - intent: ask_recommendation
  - action: action_recommend_car


- story: user choose preference
  steps:
  - intent: choose_preference
  - action: action_recommend_car


# ─────────────────────────────────────────────────────────────────────────────
# Story multi-turn: percakapan berlanjut setelah rekomendasi
# ─────────────────────────────────────────────────────────────────────────────


- story: recommend then compare budget
  steps:
  - intent: ask_recommendation
  - action: action_recommend_car
  - intent: ask_comparison
  - action: action_compare_budget


- story: lifestyle then compare budget
  steps:
  - intent: ask_recommendation
    entities:
    - preference: "anak muda"
  - action: action_recommend_car
  - intent: ask_comparison
  - action: action_compare_budget


- story: preference then refine popularity
  steps:
  - intent: choose_preference
    entities:
    - preference: "kencang"
  - action: action_recommend_car
  - intent: choose_preference
    entities:
    - preference: "paling laku"
  - action: action_recommend_car


- story: budget only then preference
  steps:
  - intent: ask_recommendation
  - action: action_recommend_car
  - intent: choose_preference
  - action: action_recommend_car


# ─────────────────────────────────────────────────────────────────────────────
# PERBAIKAN: Story khusus saat user hanya sebut budget → bot tanya preferensi
# → user jawab preferensi → bot langsung rekomendasikan
# Ini memastikan TEDPolicy memahami alur 2-turn budget-only
# ─────────────────────────────────────────────────────────────────────────────

- story: budget only then single preference answer
  steps:
  - intent: ask_recommendation
    entities:
    - budget: "400jt"
  - action: action_recommend_car
  - intent: choose_preference
    entities:
    - preference: "irit"
  - action: action_recommend_car


- story: budget only then multi preference answer
  steps:
  - intent: ask_recommendation
    entities:
    - budget: "500jt"
  - action: action_recommend_car
  - intent: choose_preference
    entities:
    - preference: "irit"
    - preference: "nyaman"
  - action: action_recommend_car


- story: budget only then multi preference with canggih
  steps:
