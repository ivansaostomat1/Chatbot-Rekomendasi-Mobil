version: "3.1"

intents:
  - greet
  - ask_recommendation
  - choose_preference
  - nlu_fallback
  - ask_comparison

actions:
  - action_recommend_car
  - action_compare_budget
responses:

  utter_default:
  - text: "Maaf, saya kurang mengerti maksud Anda. Bisa tolong ulangi dengan kata lain? 🤔"

  utter_greet:
  - text: "Halo! Saya bisa membantu rekomendasi mobil."

  utter_ask_detail:
  - text: "Baik, saya sedang mencari mobil yang cocok untuk kamu..."


entities:
  - budget
  - body_type
  - powertrain
  - feature
  - preference
  - hard_filter
  - brand

slots:
  min_budget:
    type: float
    influence_conversation: false
    mappings:
      - type: custom

  max_budget:
    type: float
    influence_conversation: false
    mappings:
      - type: custom
  brand:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: brand

  body_type:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: body_type

  powertrain:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: powertrain

  feature:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: feature

  preference:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: preference

  hard_filter:
    type: list
    influence_conversation: false
    mappings:
      - type: from_entity
        entity: hard_filter

  need:
    type: list
    influence_conversation: false
    mappings:
      - type: custom
