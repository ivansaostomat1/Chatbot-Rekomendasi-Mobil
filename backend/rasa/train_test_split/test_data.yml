version: "3.1"
nlu:
- intent: greet
  examples: |
    - hi
- intent: choose_preference
  examples: |
    - saya pilih irit
    - pilihan 2
    - yang irit
    - pilihan 3
    - canggih
    - pilihan 4
- intent: ask_recommendation
  examples: |
    - saya cari mobil kecil yang lucu tapi budget [400 juta](budget)
    - cari [SUV](body_type) tapi budget cuma [400 juta](budget), jangan [TOYOTA](brand)
    - budget saya tinggi, carikan saya [BMW](brand) [sedan](body_type)
    - mobil buat [ngebut](preference)
    - pilihin [BMW](brand) budget [600 jutaan](budget)
    - tampilkan saya mobil [Citroen](brand)
    - [BAIC](brand) budget [700 jutaan](budget)
    - budget [7M](budget) dapet mobil apa?
    - cari [BMW](brand) yang [nyaman](preference), budget [3M](budget)
    - [Chery](brand) budget [200 juta](budget) dapet apa?
    - saya cari [Mercedes](brand) Maybach
    - mobil [ground clearance tinggi](hard_filter)
    - ada kah mobil dengan budget [500jt](budget) yang cocok untuk kuliahan
    - budget [7M](budget) mau cari [BMW](brand), [MERCEDES](brand), [AUDI](brand)
    - saya cari [Subaru](brand) yang memiliki teknologi [360 camera](feature)
    - selain [FORD](brand), cariin saya mobil [SUV](body_type) budget [600 jutaan](budget)
    - mobil [irit](preference)
    - ada ga mobil [mpv](body_type) canggih di budget [200-300jt](budget)
    - saya butuh mobil [BMW](brand) yang [irit](preference) dengan budget [500 juta](budget)
    - carikan [Wuling](brand) yang [irit](preference) dan [nyaman](preference)
    - saya ingin mobil murah [irit](preference) dan [nyaman](preference) di harga [300jt](budget)
    - saya ingin mobil paling worth di harga [400-500jt](budget) wajib punya [sunroof](feature) dan [apple carplay](feature)
    - nyari [sedan](body_type) budget [500 jutaan](budget) tapi gamau merk jepang
    - [300 Juta](budget) dapet mobil [irit](preference) apa?
    - berikan saya rekomendasi mobil yang [sporty](preference)
    - saya mau cari [wuling](brand) dengan Harga [100 juta](budget)
    - [LCGC](body_type) budget [200 juta](budget) dapet apa?
    - mobil yang [irit](preference) tapi [kencang](preference) budget [350jt](budget)
    - saya cari mobil yang [performa](preference) nya bagus dengan budget [300 juta](budget)
    - rekomendasikan ke saya [City Car](body_type) dengan budget [600-800 juta](budget)
    - budget [700 jutaan](budget) bisa dapet mobil apa?
